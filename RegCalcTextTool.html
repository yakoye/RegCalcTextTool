<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RegCalcTextTool: register calculator, text formatter, DateTime, password and Hash tools.">
    <title>RegCalcTextTool</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #f8f8f8; color: #111; font-family: Arial, 'Microsoft YaHei', sans-serif; font-size: 14px; }
        .tab-bar { display: flex; align-items: end; gap: 0; padding: 8px 8px 0; background: #efefef; border-bottom: 1px solid #d0d0d0; overflow-x: auto; white-space: nowrap; }
        .tab { min-width: 92px; padding: 7px 12px; border: 1px solid #d0d0d0; border-bottom: 0; background: #e7e7e7; cursor: pointer; text-align: center; color: #333; }
        .tab.active { background: #fff; font-weight: 700; color: #000; }
        .tab-content { display: none; padding: 2px; }
        .tab-content.active { display: block; }
        .tool-frame { display: block; width: 100%; min-height: 0; height: 620px; border: 0; background: transparent; }
        @media (max-width: 640px) {
            .tab-bar { padding: 4px 4px 0; }
            .tab { min-width: 54px; padding: 6px 8px; font-size: 13px; }
            .tab[data-mobile-label] { font-size: 0; }
            .tab[data-mobile-label]::after { content: attr(data-mobile-label); font-size: 13px; }
            .tab-content { padding: 2px; }
            .tool-frame { min-height: 0; height: 560px; }
        }
    </style>
    <link rel="stylesheet" href="shared-ui.css">
    <script defer src="shared-ui.js"></script>
</head>
<body class="toolbox-shell">
    <div class="tab-bar">
        <div class="tab active" data-tab="regcalc" data-mobile-label="Reg">RegCalc</div>
        <div class="tab" data-tab="textconvert" data-mobile-label="Text">TextFormatter</div>
        <div class="tab" data-tab="timecalc" data-mobile-label="DateTime">DateTime</div>
        <div class="tab" data-tab="password" data-mobile-label="Pwd">Password</div>
        <div class="tab" data-tab="hash" data-mobile-label="Hash">Hash</div>
        <div class="tab" data-tab="externallinks" data-mobile-label="Links">Links</div>
        <div class="tab" data-tab="about" data-mobile-label="Info">About</div>
    </div>
    <div class="tab-content active" id="regcalc"><iframe class="tool-frame" title="RegCalc" data-src="RegCalc64Tool.html" src="RegCalc64Tool.html"></iframe></div>
    <div class="tab-content" id="textconvert"><iframe class="tool-frame" title="TextFormatter" data-src="TextFormatterTool.html"></iframe></div>
    <div class="tab-content" id="timecalc"><iframe class="tool-frame" title="DateTime" data-src="DateTimeTool.html"></iframe></div>
    <div class="tab-content" id="password"><iframe class="tool-frame" title="Password" data-src="PasswordTool.html"></iframe></div>
    <div class="tab-content" id="hash"><iframe class="tool-frame" title="Hash" data-src="HashTool.html"></iframe></div>
    <div class="tab-content" id="externallinks"><iframe class="tool-frame" title="Links" data-src="LinksTool.html"></iframe></div>
    <div class="tab-content" id="about"><iframe class="tool-frame" title="About" data-src="AboutTool.html"></iframe></div>
    <script>
        const tabs = document.querySelectorAll('.tab');
        const contents = Object.fromEntries(Array.from(document.querySelectorAll('.tab-content')).map(el => [el.id, el]));
        function loadFrame(tabId) {
            const frame = contents[tabId] && contents[tabId].querySelector('iframe[data-src]');
            if (frame && !frame.getAttribute('src')) frame.setAttribute('src', frame.dataset.src);
        }
        function preloadInactiveFrames() {
            Object.keys(contents).forEach(tabId => {
                if (tabId !== 'regcalc') loadFrame(tabId);
            });
        }
        function switchTab(tabId) {
            const tab = document.querySelector('.tab[data-tab="' + tabId + '"]');
            if (!tab || !contents[tabId]) return;
            tabs.forEach(item => item.classList.remove('active'));
            Object.values(contents).forEach(content => content.classList.remove('active'));
            tab.classList.add('active');
            contents[tabId].classList.add('active');
            loadFrame(tabId);
        }
        tabs.forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
        window.addEventListener('message', event => {
            if (!event.data) return;
            if (event.data.type === 'switch-tab') switchTab(event.data.tab);
            if (event.data.type === 'tool-resize') {
                const frame = Array.from(document.querySelectorAll('iframe')).find(item => item.contentWindow === event.source);
                const height = Math.max(240, Math.ceil(Number(event.data.height) || 0));
                if (frame && height) frame.style.height = height + 'px';
            }
        });
        window.setTimeout(preloadInactiveFrames, 1000);
    </script>
</body>
</html>
